; Generated for SmartFoundations localization
[CommonSettings]
ModulesToPreload=SmartFoundations
SourcePath=Mods/smart/Content/Localization/SmartFoundations
DestinationPath=Mods/smart/Content/Localization/SmartFoundations
ManifestName=SmartFoundations.manifest
ArchiveName=SmartFoundations.archive
NativeCulture=en
CulturesToGenerate=en
CulturesToGenerate=de
CulturesToGenerate=es
CulturesToGenerate=fr
CulturesToGenerate=it
CulturesToGenerate=ja
CulturesToGenerate=ko
CulturesToGenerate=pl
