[AccessTransformers]
; Access mBuildModeCurve on AFGConveyorBeltHologram for build mode routing in stackable poles
Accessor=(Class="AFGConveyorBeltHologram", Property="mBuildModeCurve")
; Access mBuildModeStraight as well so we can copy both build mode descriptors from vanilla BP defaults
Accessor=(Class="AFGConveyorBeltHologram", Property="mBuildModeStraight")
Friend=(Class="AFGConveyorBeltHologram", FriendClass="ASFConveyorBeltHologram")
; [#383] Friend access lets the pipe hologram call the protected per-mode routing functions
; (AutoRouteCurveSpline / Auto2DRouteSpline / HorizontalAndVerticalRouteSpline / PathFindingRouteSpline /
; AutoRouteStraightSpline) and SetRoutingMode - pipes dispatch per mode, unlike the belt's single router.
Friend=(Class="AFGPipelineHologram", FriendClass="ASFPipelineHologram")
; Friend access for upgrade service to call GenerateAndUpdateSpline (same approach as MassUpgrade)
Friend=(Class="AFGConveyorBeltHologram", FriendClass="USFUpgradeExecutionService")
; Friend access for the chain actor service to call the private tick-group migration APIs
; (RemoveChainActorFromConveyorGroup, MigrateConveyorGroupToChainActor) and to read
; mConveyorTickGroup / mConveyorGroupsPendingChainActors. See Services/SFChainActorService.h
; for rationale - confirmed via live in-game testing (v29.2.2).
Friend=(Class="AFGBuildableSubsystem", FriendClass="USFChainActorService")
; Null-wire dismantle guard: scrub null/dead entries from circuit connections' protected mWires
; before vanilla's Dismantle_Implementation calls Execute_Dismantle on them (asserts on null).
Friend=(Class="UFGCircuitConnectionComponent", FriendClass="USFChainActorService")
; Friend access for child hologram lock-state maintenance without calling
; LockHologramPosition(), which creates build-gun UI widgets during scaling.
Friend=(Class="AFGHologram", FriendClass="FSFHologramHelperService")
; MP Slice 0 safety guard accesses InternalExecuteDuBuildStepInput. Issue #489 also observes
; mSampledClipboardSettings after vanilla MMB sampling so Smart only inherits factory settings
; when vanilla's Sample Building Copies Settings preference authorizes it.
Friend=(Class="UFGBuildGunStateBuild", FriendClass="USFGameInstanceModule")
; MP spec-construction hooks (class-agnostic): strip/restore the SF_GridChild children around the
; construct-message write and add expanded children pre-construct - mChildren is protected.
Friend=(Class="AFGHologram", FriendClass="USFGameInstanceModule")
; MP spec-construction group hook: ConfigureActor (protected) is the pre-BeginPlay window where
; spec-built buildables join their Smart Dismantle blueprint proxy.
Friend=(Class="AFGBuildableHologram", FriendClass="USFGameInstanceModule")
; [#168] Scaleable blueprints: the blueprint adapter reads the composite footprint from the
; protected mLocalBounds - the boundary source for blueprint grids (the size registry doesn't
; apply to composites). Exact bounds drive edge-to-edge tiling so vanilla's own blueprint
; auto-connect (FGBlueprintOpenConnectionManager) can wire the seams.
Friend=(Class="AFGBlueprintHologram", FriendClass="FSFBlueprintAdapter")
; [#168] Smart! Blueprints seam auto-connect: the pair search reads the private
; mDuplicateConnectionToOriginalMap - dup connectors' ORIGINALS carry the transform-invariant
; blueprint-world geometry and the openness state (FR2). All access is confined to the seam service.
Friend=(Class="AFGBlueprintHologram", FriendClass="FSFBlueprintSeamService")
