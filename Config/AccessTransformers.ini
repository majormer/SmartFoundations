[AccessTransformers]
; Access mBuildModeCurve on AFGConveyorBeltHologram for build mode routing in stackable poles
Accessor=(Class="AFGConveyorBeltHologram", Property="mBuildModeCurve")
; Access mBuildModeStraight as well so we can copy both build mode descriptors from vanilla BP defaults
Accessor=(Class="AFGConveyorBeltHologram", Property="mBuildModeStraight")
Friend=(Class="AFGConveyorBeltHologram", FriendClass="ASFConveyorBeltHologram")
Friend=(Class="AFGPipelineHologram", FriendClass="ASFPipelineHologram")
; Friend access for upgrade service to call GenerateAndUpdateSpline (same approach as MassUpgrade)
Friend=(Class="AFGConveyorBeltHologram", FriendClass="USFUpgradeExecutionService")
; Friend access for the chain actor service to call the private tick-group migration APIs
; (RemoveChainActorFromConveyorGroup, MigrateConveyorGroupToChainActor) and to read
; mConveyorTickGroup / mConveyorGroupsPendingChainActors. See Services/SFChainActorService.h
; for rationale - confirmed via live in-game testing (v29.2.2).
Friend=(Class="AFGBuildableSubsystem", FriendClass="USFChainActorService")
; Friend access for child hologram lock-state maintenance without calling
; LockHologramPosition(), which creates build-gun UI widgets during scaling.
Friend=(Class="AFGHologram", FriendClass="FSFHologramHelperService")
; MP Slice 0 safety guard: the game instance module hooks the protected
; UFGBuildGunStateBuild::InternalExecuteDuBuildStepInput (client fire handler) to refuse an oversized client
; scaled-grid construct before vanilla serializes/sends it.
Friend=(Class="UFGBuildGunStateBuild", FriendClass="USFGameInstanceModule")
; MP spec-construction hooks (class-agnostic): strip/restore the SF_GridChild children around the
; construct-message write and add expanded children pre-construct - mChildren is protected.
Friend=(Class="AFGHologram", FriendClass="USFGameInstanceModule")
