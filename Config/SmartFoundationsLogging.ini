; Smart! Mod - Logging Configuration
; 
; Controls per-category log verbosity to reduce console spam while preserving
; diagnostic capabilities. Changes here take effect on mod reload or via
; SF.Log.ResetToConfig console command.
;
; Verbosity Levels:
;   None        - Suppress all logs for this category
;   Critical    - Only errors and warnings (minimal output) -- DEFAULT for every category
;   Normal      - Important state changes and events
;   Verbose     - Detailed diagnostic information
;   VeryVerbose - Extremely detailed, high-volume logs (development only)
;
; Runtime Commands:
;   SF.Log.List                              - Show all category settings
;   SF.Log.SetVerbosity <Category> <Level>   - Change category at runtime
;   SF.Log.ResetToConfig                     - Reload this file
;
; Performance Note: VeryVerbose can generate thousands of log lines per second.
; Use sparingly and only for specific debugging scenarios.

[/Script/SmartFoundations.SFLogRegistry]

; ============================================================================
; Core Systems (High Volume - Conservative Defaults)
; ============================================================================

; Adapter size detection - EXTREMELY NOISY (100+ lines per hologram)
; Off by default, enable with VeryVerbose only when debugging size issues
Category_AdapterSizing=None

; Input events - Fires on every keypress/axis change
; Critical only shows errors, use Verbose to see all input
Category_InputEvents=Critical

; Mode toggle state - Reasonably quiet, Normal is safe
Category_ModeChanges=Critical

; Counter updates - Can be noisy with rapid input
; Critical recommended unless debugging counter logic
Category_CounterUpdates=Critical

; HUD/Widget updates - Fires on every display change
; Critical recommended unless debugging UI
Category_HUDUpdates=Critical

; ============================================================================
; Grid/Array Features
; ============================================================================

; Grid regeneration - Important for debugging child spawn/destroy
Category_GridRegeneration=Critical

; Grid positioning - VERY NOISY (one line per child per frame)
; Off by default, use VeryVerbose only when debugging positioning
Category_GridPositioning=None

; Child lifecycle - Spawn/destroy events, reasonably quiet
Category_ChildLifecycle=Critical

; ============================================================================
; Build Gun Integration
; ============================================================================

; Build gun state tracking
Category_BuildGunState=Critical

; Hologram registration/unregistration
Category_HologramRegistration=Critical

; ============================================================================
; Feature Modules
; ============================================================================

; Arrow visualization system (errors only; raise to Verbose to debug arrow asset loading)
Category_Arrows=Critical

; Scaling feature
Category_Scaling=Critical

; Spacing feature
Category_Spacing=Critical

; Steps/stairs feature
Category_Steps=Critical

; Twirl/rotation feature
Category_Twirl=Critical

; ============================================================================
; Performance & Diagnostics
; ============================================================================

; Performance measurement and optimization
Category_Performance=Critical

; Multiplayer synchronization
Category_NetworkSync=Critical

; ============================================================================
; Developer Profiles (Quick Presets)
; ============================================================================
; Copy these settings to quickly switch between logging profiles:

; SILENT (Production) - Minimal logging
; All categories = Critical or None

; NORMAL (Default) - Balanced logging
; Core systems = Critical, Features = Normal, Positioning = None

; DEBUG (Development) - Verbose logging
; Core systems = Verbose, Features = Verbose, Positioning = None

; TRACE (Deep Dive) - Maximum logging
; All categories = VeryVerbose (WARNING: EXTREME SPAM)
